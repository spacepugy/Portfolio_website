    <title>PugyPortfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #6849f2;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
            background: linear-gradient(135deg, #26c931 0%, #16661c 100%);
            border-bottom: 8px solid white;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .text {
            font-size: 3.8rem;
            color: white;
            font-weight: 600;
            line-height: 1.4;
        }

        .word {
            display: inline-block;
            margin: 0 0.2em;
            opacity: 0;
            transform: translateY(60px);
            animation: slideUp 1.0s ease-in-out forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Video Section Styles */
        .videos-section {
            width: 100vw;
            padding: 80px 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            background: linear-gradient(135deg, #6849f2 0%, #4a2b8a 100%);
        }

        .video-container {
            background: #e8dcc8;
            border-radius: 12px;
            overflow: hidden;
            padding: 30px;
            opacity: 0;
            transform: scale(0.8) translateY(40px);
        }

        .video-container.visible {
            animation: videoPopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .video-container[data-index="0"].visible {
            animation: videoPopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .video-container[data-index="1"].visible {
            animation: videoPopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
        }

        .video-container[data-index="2"].visible {
            animation: videoPopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        }

        .video-container[data-index="3"].visible {
            animation: videoPopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s forwards;
        }

        @keyframes videoPopIn {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .video-wrapper iframe,
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-title {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #333;
            font-weight: 600;
        }

        .video-description {
            margin-top: 10px;
            font-size: 1rem;
            color: #666;
        }

        /* Contact Section Styles */
        .contact-section {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #ba6c3f 0%, #8a4a2b 100%);
            border-top: 8px solid white;
        }

        .contact-section h2 {
            font-size: 2rem;
            color: white;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .contact-links a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 10px 20px;
            border: 2px solid white;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .contact-links svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .contact-links a:hover svg {
            fill: #6849f2;
        }

        .contact-links a:hover {
            background: white;
            color: #6849f2;
            transform: translateY(-2px);
        }
    </style>
</head>

    <script>
        const text = "My work / portfolio:";
        const textContainer = document.getElementById('animatedText');
        const words = text.split(' ');

        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = word;
            span.style.animationDelay = `${index * 0.1}s`;
            textContainer.appendChild(span);
        });

        // Intersection Observer for video scroll animations
        const videoContainers = document.querySelectorAll('.video-container');
        
        // Add data-index to each video container
        videoContainers.forEach((video, index) => {
            video.setAttribute('data-index', index);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.0
        });

        videoContainers.forEach(video => {
            observer.observe(video);
        });
    </script>
